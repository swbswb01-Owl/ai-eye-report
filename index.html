<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI眼健康五维评估报告</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: #0F172A;
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
}
.container {
  max-width: 480px;
  margin: 0 auto;
  padding: 16px;
  position: relative;
}

/* 顶部标题 */
.header {
  text-align: center;
  margin-bottom: 20px;
}
.header h1 { font-size: 20px; font-weight: 600; }
.header p { font-size: 12px; color: #94A3B8; margin-top: 4px; }

/* 综合评分圆环 */
.score-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 20px;
  position: relative;
}
.score-ring {
  width: 200px;
  height: 200px;
  position: relative;
}
.score-ring svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}
.score-ring .bg-circle {
  fill: none;
  stroke: #334155;
  stroke-width: 12;
}
.score-ring .progress-circle {
  fill: none;
  stroke-width: 12;
  stroke-linecap: round;
  transition: stroke-dashoffset 2s cubic-bezier(0.33, 1, 0.68, 1);
}
.score-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
.score-number {
  font-size: 56px;
  font-weight: 700;
  line-height: 1;
}
.score-label {
  font-size: 12px;
  color: #94A3B8;
  margin-top: 4px;
}

/* 评级 */
.rating-badge {
  margin-top: 12px;
  padding: 6px 20px;
  border-radius: 20px;
  font-size: 16px;
  font-weight: 600;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.6s ease;
}
.rating-badge.show {
  opacity: 1;
  transform: translateY(0);
}

/* 对比信息 */
.compare-info {
  text-align: center;
  margin-top: 12px;
  font-size: 14px;
}
.compare-info .beat {
  color: #38BDF8;
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.8s ease 0.5s;
}
.compare-info .beat.show { opacity: 1; }
.compare-info .change {
  color: #4ADE80;
  font-weight: 500;
  margin-top: 4px;
  opacity: 0;
  transition: opacity 0.8s ease 0.8s;
}
.compare-info .change.show { opacity: 1; }

/* 雷达图 */
.radar-section {
  margin-bottom: 20px;
  opacity: 0;
  transition: opacity 1s ease;
}
.radar-section.show { opacity: 1; }
#radarChart { width: 100%; height: 280px; }

/* 进度条 */
.bars-section {
  margin-bottom: 20px;
}
.bar-item {
  margin-bottom: 12px;
}
.bar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.bar-name { font-size: 13px; color: #CBD5E1; }
.bar-score { font-size: 14px; font-weight: 600; opacity: 0; transition: opacity 0.3s; }
.bar-score.show { opacity: 1; }
.bar-track {
  height: 10px;
  background: #334155;
  border-radius: 5px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 5px;
  width: 0%;
  transition: width 1s cubic-bezier(0.33, 1, 0.68, 1);
}

/* AI洞察 */
.insight-section {
  background: #1E293B;
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 16px;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.8s ease;
}
.insight-section.show {
  opacity: 1;
  transform: translateY(0);
}
.insight-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 10px;
  text-align: center;
}
.insight-item {
  font-size: 13px;
  color: #CBD5E1;
  padding: 6px 0;
  border-bottom: 1px solid #334155;
  opacity: 0;
  transform: translateX(-10px);
  transition: all 0.5s ease;
}
.insight-item:last-child { border-bottom: none; }
.insight-item.show {
  opacity: 1;
  transform: translateX(0);
}

/* 底部品牌 */
.brand {
  text-align: center;
  margin-top: 20px;
  font-size: 11px;
  color: #64748B;
  font-style: italic;
}

/* 重播按钮 */
.replay-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #38BDF8;
  border: none;
  color: #0F172A;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(56,189,248,0.4);
  z-index: 100;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>AI眼健康五维评估报告</h1>
    <p>检查日期：2026-06-09</p>
  </div>

  <div class="score-section">
    <div class="score-ring">
      <svg viewBox="0 0 200 200">
        <circle class="bg-circle" cx="100" cy="100" r="86"/>
        <circle class="progress-circle" id="progressCircle" cx="100" cy="100" r="86"
          stroke="#4CAF50" stroke-dasharray="540.35" stroke-dashoffset="540.35"/>
      </svg>
      <div class="score-text">
        <div class="score-number" id="scoreNumber">0</div>
        <div class="score-label">综合评分</div>
      </div>
    </div>
    <div class="rating-badge" id="ratingBadge" style="background: rgba(76,175,80,0.2); color: #4CAF50;">
      A级 · 优秀
    </div>
    <div class="compare-info">
      <div class="beat" id="beatText">击败同年龄段 73% 用户</div>
      <div class="change" id="changeText">较半年前 ↑ 4.5 分</div>
    </div>
  </div>

  <div class="radar-section" id="radarSection">
    <div id="radarChart"></div>
  </div>

  <div class="bars-section" id="barsSection">
    <div class="bar-item">
      <div class="bar-header">
        <span class="bar-name">视力清晰度</span>
        <span class="bar-score" id="score0">78</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar0" style="background: #FBBF24;"></div></div>
    </div>
    <div class="bar-item">
      <div class="bar-header">
        <span class="bar-name">屈光状态</span>
        <span class="bar-score" id="score1">82</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar1" style="background: #4ADE80;"></div></div>
    </div>
    <div class="bar-item">
      <div class="bar-header">
        <span class="bar-name">眼底健康</span>
        <span class="bar-score" id="score2">91</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar2" style="background: #4ADE80;"></div></div>
    </div>
    <div class="bar-item">
      <div class="bar-header">
        <span class="bar-name">用眼负荷</span>
        <span class="bar-score" id="score3">55</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar3" style="background: #F87171;"></div></div>
    </div>
    <div class="bar-item">
      <div class="bar-header">
        <span class="bar-name">未来风险</span>
        <span class="bar-score" id="score4">85</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="bar4" style="background: #4ADE80;"></div></div>
    </div>
  </div>

  <div class="insight-section" id="insightSection">
    <div class="insight-title">[*] AI 洞察</div>
    <div class="insight-item" id="insight0">[OK] 眼底健康优秀，无异常病变信号</div>
    <div class="insight-item" id="insight1">[!] 用眼负荷偏高，日均屏幕时间 9.2 小时，建议每 20 分钟远眺 20 秒</div>
    <div class="insight-item" id="insight2">-> 近视控制稳定，半年仅增长 5 度，继续保持当前方案</div>
  </div>

  <div class="brand">AI视光师助理 · 眼健康五维评估系统</div>
</div>

<button class="replay-btn" onclick="replay()" title="重播动画">↻</button>

<script>
// ========== 数据 ==========
const overallScore = 80;
const beatPercentile = 73;
const changeScore = 4.5;

const dimensions = [
  { name: '视力清晰度', score: 78, benchmark: 65, color: '#FBBF24' },
  { name: '屈光状态', score: 82, benchmark: 70, color: '#4ADE80' },
  { name: '眼底健康', score: 91, benchmark: 60, color: '#4ADE80' },
  { name: '用眼负荷', score: 55, benchmark: 50, color: '#F87171' },
  { name: '未来风险', score: 85, benchmark: 55, color: '#4ADE80' },
];

const circumference = 2 * Math.PI * 86; // 540.35

// ========== 数字滚动 ==========
function animateNumber(target, duration = 2000) {
  const el = document.getElementById('scoreNumber');
  const start = Date.now();
  function tick() {
    const t = Math.min((Date.now() - start) / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3);
    el.textContent = Math.round(eased * target);
    if (t < 1) requestAnimationFrame(tick);
  }
  tick();
}

// ========== 圆环进度 ==========
function animateRing(targetScore) {
  const circle = document.getElementById('progressCircle');
  const ratio = targetScore / 100;
  const offset = circumference * (1 - ratio);
  setTimeout(() => {
    circle.style.strokeDashoffset = offset;
  }, 100);
}

// ========== 雷达图 ==========
let radarChart;
function initRadar() {
  radarChart = echarts.init(document.getElementById('radarChart'));
  const option = {
    backgroundColor: 'transparent',
    radar: {
      indicator: dimensions.map(d => ({ name: d.name, max: 100 })),
      center: ['50%', '50%'],
      radius: '65%',
      axisName: { color: '#CBD5E1', fontSize: 11 },
      splitArea: { areaStyle: { color: 'transparent' } },
      splitLine: { lineStyle: { color: '#334155' } },
      axisLine: { lineStyle: { color: '#334155' } },
      splitNumber: 5,
    },
    series: [{
      type: 'radar',
      data: [
        {
          value: dimensions.map(() => 0),
          name: '同龄人平均',
          symbol: 'circle',
          symbolSize: 4,
          lineStyle: { color: '#64748B', width: 1.5 },
          areaStyle: { color: 'rgba(100,116,139,0.1)' },
          itemStyle: { color: '#64748B' }
        },
        {
          value: dimensions.map(() => 0),
          name: '您的评分',
          symbol: 'circle',
          symbolSize: 6,
          lineStyle: { color: '#38BDF8', width: 2.5 },
          areaStyle: { color: 'rgba(56,189,248,0.2)' },
          itemStyle: { color: '#38BDF8', borderColor: '#0F172A', borderWidth: 2 }
        }
      ],
      animationDuration: 2000,
      animationEasing: 'cubicOut'
    }],
    legend: {
      data: ['同龄人平均', '您的评分'],
      bottom: 0,
      textStyle: { color: '#94A3B8', fontSize: 10 },
      itemWidth: 12,
      itemHeight: 8
    }
  };
  radarChart.setOption(option);

  // 动画到真实值
  setTimeout(() => {
    radarChart.setOption({
      series: [{
        data: [
          { value: dimensions.map(d => d.benchmark), name: '同龄人平均' },
          { value: dimensions.map(d => d.score), name: '您的评分' }
        ]
      }]
    });
  }, 1500);
}

// ========== 进度条 ==========
function animateBars() {
  dimensions.forEach((d, i) => {
    setTimeout(() => {
      document.getElementById('bar' + i).style.width = d.score + '%';
      document.getElementById('score' + i).classList.add('show');
    }, 2000 + i * 300);
  });
}

// ========== 评级/对比/洞察 ==========
function showExtras() {
  setTimeout(() => document.getElementById('ratingBadge').classList.add('show'), 2200);
  setTimeout(() => document.getElementById('beatText').classList.add('show'), 2600);
  setTimeout(() => document.getElementById('changeText').classList.add('show'), 2900);
  setTimeout(() => document.getElementById('radarSection').classList.add('show'), 1200);
  setTimeout(() => document.getElementById('insightSection').classList.add('show'), 3800);

  [0,1,2].forEach(i => {
    setTimeout(() => {
      document.getElementById('insight' + i).classList.add('show');
    }, 4000 + i * 200);
  });
}

// ========== 重播 ==========
function replay() {
  // 重置所有
  document.getElementById('scoreNumber').textContent = '0';
  document.getElementById('progressCircle').style.strokeDashoffset = circumference;
  document.getElementById('ratingBadge').classList.remove('show');
  document.getElementById('beatText').classList.remove('show');
  document.getElementById('changeText').classList.remove('show');
  document.getElementById('radarSection').classList.remove('show');
  document.getElementById('insightSection').classList.remove('show');
  dimensions.forEach((d, i) => {
    document.getElementById('bar' + i).style.width = '0%';
    document.getElementById('score' + i).classList.remove('show');
  });
  [0,1,2].forEach(i => document.getElementById('insight' + i).classList.remove('show'));

  // 重新动画
  if (radarChart) {
    radarChart.setOption({
      series: [{
        data: [
          { value: dimensions.map(() => 0), name: '同龄人平均' },
          { value: dimensions.map(() => 0), name: '您的评分' }
        ]
      }]
    });
  }

  setTimeout(() => {
    animateNumber(overallScore);
    animateRing(overallScore);
    showExtras();
    animateBars();
    if (radarChart) {
      setTimeout(() => {
        radarChart.setOption({
          series: [{
            data: [
              { value: dimensions.map(d => d.benchmark), name: '同龄人平均' },
              { value: dimensions.map(d => d.score), name: '您的评分' }
            ]
          }]
        });
      }, 500);
    }
  }, 300);
}

// ========== 初始化 ==========
window.onload = function() {
  initRadar();
  animateNumber(overallScore);
  animateRing(overallScore);
  showExtras();
  animateBars();
};

// 响应式
window.addEventListener('resize', () => {
  if (radarChart) radarChart.resize();
});
</script>

</body>
</html>
