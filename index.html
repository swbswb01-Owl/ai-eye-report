<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI眼健康五维评估报告</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: #0F172A;
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
}
.container {
  max-width: 480px;
  margin: 0 auto;
  padding: 16px;
  position: relative;
}

/* 顶部标题 */
.header {
  text-align: center;
  margin-bottom: 20px;
}
.header h1 { font-size: 20px; font-weight: 600; }
.header p { font-size: 12px; color: #94A3B8; margin-top: 4px; }

/* 综合评分圆环 */
.score-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 20px;
  position: relative;
}
.score-ring {
  width: 200px;
  height: 200px;
  position: relative;
}
.score-ring svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}
.score-ring .bg-circle {
  fill: none;
  stroke: #334155;
  stroke-width: 12;
}
.score-ring .progress-circle {
  fill: none;
  stroke-width: 12;
  stroke-linecap: round;
}
.score-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
.score-number {
  font-size: 56px;
  font-weight: 700;
  line-height: 1;
}
.score-label {
  font-size: 12px;
  color: #94A3B8;
  margin-top: 4px;
}

/* 评级 */
.rating-badge {
  margin-top: 12px;
  padding: 6px 20px;
  border-radius: 20px;
  font-size: 16px;
  font-weight: 600;
  opacity: 0;
  transform: translateY(10px) scale(0.8);
}
.rating-badge.show {
  opacity: 1;
  transform: translateY(0) scale(1);
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* 对比信息 */
.compare-info {
  text-align: center;
  margin-top: 12px;
  font-size: 14px;
}
.compare-info .beat {
  color: #38BDF8;
  font-weight: 500;
  opacity: 0;
}
.compare-info .beat.show {
  opacity: 1;
  transition: opacity 0.6s ease;
}
.compare-info .change {
  color: #4ADE80;
  font-weight: 500;
  margin-top: 4px;
  opacity: 0;
}
.compare-info .change.show {
  opacity: 1;
  transition: opacity 0.6s ease;
}

/* 雷达图 */
.radar-section {
  margin-bottom: 20px;
  opacity: 0;
  transition: opacity 0.8s ease;
}
.radar-section.show { opacity: 1; }
#radarCanvas {
  width: 100%;
  height: 280px;
  display: block;
}

/* 进度条 */
.bars-section { margin-bottom: 20px; }
.bar-item {
  margin-bottom: 12px;
  opacity: 0;
  transform: translateX(-20px);
}
.bar-item.show {
  opacity: 1;
  transform: translateX(0);
  transition: all 0.4s ease;
}
.bar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.bar-name { font-size: 13px; color: #CBD5E1; }
.bar-score { font-size: 14px; font-weight: 600; }
.bar-track {
  height: 10px;
  background: #334155;
  border-radius: 5px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 5px;
  width: 0%;
}

/* AI洞察 */
.insight-section {
  background: #1E293B;
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 16px;
  opacity: 0;
  transform: translateY(20px);
}
.insight-section.show {
  opacity: 1;
  transform: translateY(0);
  transition: all 0.6s ease;
}
.insight-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 10px;
  text-align: center;
}
.insight-item {
  font-size: 13px;
  color: #CBD5E1;
  padding: 6px 0;
  border-bottom: 1px solid #334155;
  opacity: 0;
  transform: translateX(-10px);
}
.insight-item:last-child { border-bottom: none; }
.insight-item.show {
  opacity: 1;
  transform: translateX(0);
  transition: all 0.4s ease;
}

/* 底部品牌 */
.brand {
  text-align: center;
  margin-top: 20px;
  font-size: 11px;
  color: #64748B;
  font-style: italic;
}

/* 重播按钮 */
.replay-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #38BDF8;
  border: none;
  color: #0F172A;
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(56,189,248,0.4);
  z-index: 100;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>AI眼健康五维评估报告</h1>
    <p>检查日期：2026-06-09</p>
  </div>

  <div class="score-section">
    <div class="score-ring">
      <svg viewBox="0 0 200 200">
        <circle class="bg-circle" cx="100" cy="100" r="86"/>
        <circle class="progress-circle" id="progressCircle" cx="100" cy="100" r="86"
          stroke="#4CAF50" stroke-dasharray="540.35" stroke-dashoffset="540.35"/>
      </svg>
      <div class="score-text">
        <div class="score-number" id="scoreNumber">0</div>
        <div class="score-label">综合评分</div>
      </div>
    </div>
    <div class="rating-badge" id="ratingBadge" style="background: rgba(76,175,80,0.2); color: #4CAF50;">
      A级 · 优秀
    </div>
    <div class="compare-info">
      <div class="beat" id="beatText">击败同年龄段 73% 用户</div>
      <div class="change" id="changeText">较半年前 ↑ 4.5 分</div>
    </div>
  </div>

  <div class="radar-section" id="radarSection">
    <canvas id="radarCanvas"></canvas>
  </div>

  <div class="bars-section" id="barsSection">
    <div class="bar-item" id="barItem0">
      <div class="bar-header">
        <span class="bar-name">视力清晰度</span>
        <span class="bar-score" id="scoreLabel0">78</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="barFill0" style="background: #FBBF24;"></div></div>
    </div>
    <div class="bar-item" id="barItem1">
      <div class="bar-header">
        <span class="bar-name">屈光状态</span>
        <span class="bar-score" id="scoreLabel1">82</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="barFill1" style="background: #4ADE80;"></div></div>
    </div>
    <div class="bar-item" id="barItem2">
      <div class="bar-header">
        <span class="bar-name">眼底健康</span>
        <span class="bar-score" id="scoreLabel2">91</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="barFill2" style="background: #4ADE80;"></div></div>
    </div>
    <div class="bar-item" id="barItem3">
      <div class="bar-header">
        <span class="bar-name">用眼负荷</span>
        <span class="bar-score" id="scoreLabel3">55</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="barFill3" style="background: #F87171;"></div></div>
    </div>
    <div class="bar-item" id="barItem4">
      <div class="bar-header">
        <span class="bar-name">未来风险</span>
        <span class="bar-score" id="scoreLabel4">85</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="barFill4" style="background: #4ADE80;"></div></div>
    </div>
  </div>

  <div class="insight-section" id="insightSection">
    <div class="insight-title">[*] AI 洞察</div>
    <div class="insight-item" id="insight0">[OK] 眼底健康优秀，无异常病变信号</div>
    <div class="insight-item" id="insight1">[!] 用眼负荷偏高，日均屏幕时间 9.2 小时，建议每 20 分钟远眺 20 秒</div>
    <div class="insight-item" id="insight2">-> 近视控制稳定，半年仅增长 5 度，继续保持当前方案</div>
  </div>

  <div class="brand">AI视光师助理 · 眼健康五维评估系统</div>
</div>

<button class="replay-btn" onclick="replay()" title="重播动画">↻</button>

<script>
// ========== 数据 ==========
const overallScore = 80;
const beatPercentile = 73;
const changeScore = 4.5;

const dimensions = [
  { name: '视力清晰度', score: 78, benchmark: 65, color: '#FBBF24' },
  { name: '屈光状态', score: 82, benchmark: 70, color: '#4ADE80' },
  { name: '眼底健康', score: 91, benchmark: 60, color: '#4ADE80' },
  { name: '用眼负荷', score: 55, benchmark: 50, color: '#F87171' },
  { name: '未来风险', score: 85, benchmark: 55, color: '#4ADE80' },
];

const circumference = 2 * Math.PI * 86;

// ========== 缓动函数 ==========
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

// ========== 动画状态机 ==========
let animFrame = null;
let startTime = null;
const PHASES = {
  SCORE_ROLL:   { start: 0,    end: 2000 },   // 数字滚动 + 圆环画满
  RATING_POP:   { start: 2200, end: 2800 },   // 评级弹出
  COMPARE_SHOW: { start: 3000, end: 3800 },   // 击败% + 进步对比依次显示
  RADAR_DRAW:   { start: 3500, end: 5500 },   // 雷达图从中心展开
  BARS_FILL:    { start: 5500, end: 8000 },   // 进度条逐个填充
  INSIGHT_SHOW: { start: 8200, end: 9500 },   // AI洞察一条条浮现
};

function resetAll() {
  // 数字
  document.getElementById('scoreNumber').textContent = '0';
  // 圆环
  document.getElementById('progressCircle').style.strokeDashoffset = circumference;
  // 评级
  document.getElementById('ratingBadge').classList.remove('show');
  // 对比
  document.getElementById('beatText').classList.remove('show');
  document.getElementById('changeText').classList.remove('show');
  // 雷达
  document.getElementById('radarSection').classList.remove('show');
  radarProgress = 0;
  // 进度条
  dimensions.forEach((d, i) => {
    document.getElementById('barItem' + i).classList.remove('show');
    document.getElementById('barFill' + i).style.width = '0%';
  });
  // 洞察
  document.getElementById('insightSection').classList.remove('show');
  [0,1,2].forEach(i => document.getElementById('insight' + i).classList.remove('show'));
}

// ========== 雷达图（Canvas 手绘，逐帧控制） ==========
let radarCanvas, radarCtx;
let radarProgress = 0; // 0 ~ 1

function initRadarCanvas() {
  radarCanvas = document.getElementById('radarCanvas');
  const dpr = window.devicePixelRatio || 1;
  const rect = radarCanvas.getBoundingClientRect();
  radarCanvas.width = rect.width * dpr;
  radarCanvas.height = rect.height * dpr;
  radarCtx = radarCanvas.getContext('2d');
  radarCtx.scale(dpr, dpr);
}

function drawRadarCanvas(progress) {
  const ctx = radarCtx;
  const W = radarCanvas.width / (window.devicePixelRatio || 1);
  const H = radarCanvas.height / (window.devicePixelRatio || 1);
  const cx = W / 2;
  const cy = H / 2 - 10;
  const R = Math.min(W, H) * 0.35;
  const N = dimensions.length;

  ctx.clearRect(0, 0, W, H);

  // 网格线
  for (let level = 1; level <= 5; level++) {
    ctx.beginPath();
    const r = R * level / 5;
    for (let i = 0; i <= N; i++) {
      const angle = -Math.PI / 2 + (i / N) * Math.PI * 2;
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // 轴线
  for (let i = 0; i < N; i++) {
    const angle = -Math.PI / 2 + (i / N) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle) * R, cy + Math.sin(angle) * R);
    ctx.strokeStyle = '#334155';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // 标签
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < N; i++) {
    const angle = -Math.PI / 2 + (i / N) * Math.PI * 2;
    const labelR = R + 22;
    const lx = cx + Math.cos(angle) * labelR;
    const ly = cy + Math.sin(angle) * labelR;
    ctx.fillStyle = '#CBD5E1';
    ctx.fillText(dimensions[i].name, lx, ly);
  }

  // 刻度值
  ctx.font = '9px -apple-system, sans-serif';
  ctx.fillStyle = '#64748B';
  [20, 40, 60, 80, 100].forEach(v => {
    const r = R * v / 100;
    ctx.fillText(String(v), cx + 4, cy - r + 2);
  });

  // 同龄人基准（灰色虚线）
  ctx.beginPath();
  for (let i = 0; i <= N; i++) {
    const idx = i % N;
    const angle = -Math.PI / 2 + (i / N) * Math.PI * 2;
    const r = R * dimensions[idx].benchmark / 100;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = 'rgba(100,116,139,0.5)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  // 用户雷达图（按进度展开）
  if (progress > 0) {
    const eased = easeOutCubic(progress);
    const points = [];
    for (let i = 0; i < N; i++) {
      const angle = -Math.PI / 2 + (i / N) * Math.PI * 2;
      const r = R * (dimensions[i].score / 100) * eased;
      points.push({
        x: cx + Math.cos(angle) * r,
        y: cy + Math.sin(angle) * r,
        val: dimensions[i].score,
        angle: angle,
        finalR: R * dimensions[i].score / 100
      });
    }

    // 填充
    ctx.beginPath();
    points.forEach((p, i) => {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });
    ctx.closePath();
    ctx.fillStyle = 'rgba(56,189,248,0.15)';
    ctx.fill();

    // 边线
    ctx.beginPath();
    points.forEach((p, i) => {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });
    ctx.closePath();
    ctx.strokeStyle = '#38BDF8';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 顶点 + 标注
    points.forEach((p, i) => {
      // 点
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#0F172A';
      ctx.fill();
      ctx.strokeStyle = '#38BDF8';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // 分数标注（进度>0.7时显示）
      if (progress > 0.7) {
        const labelAlpha = Math.min((progress - 0.7) / 0.3, 1);
        const offset = p.val > 80 ? -12 : 14;
        ctx.globalAlpha = labelAlpha;
        ctx.font = 'bold 11px -apple-system, sans-serif';
        ctx.fillStyle = p.val >= 80 ? '#4ADE80' : p.val >= 60 ? '#FBBF24' : '#F87171';
        ctx.fillText(String(p.val), p.x, p.y + offset);
        ctx.globalAlpha = 1;
      }
    });
  }
}

// ========== 主动画循环 ==========
function animate() {
  const now = Date.now();
  const elapsed = now - startTime;

  // 阶段0: 数字滚动 + 圆环画满 (0~2000ms)
  if (elapsed < PHASES.SCORE_ROLL.end) {
    const t = Math.min(elapsed / PHASES.SCORE_ROLL.end, 1);
    const eased = easeOutCubic(t);
    document.getElementById('scoreNumber').textContent = Math.round(eased * overallScore);
    const offset = circumference * (1 - eased * overallScore / 100);
    document.getElementById('progressCircle').style.strokeDashoffset = offset;
  }

  // 阶段1: 评级弹出 (2200~2800ms)
  if (elapsed >= PHASES.RATING_POP.start && elapsed < PHASES.RATING_POP.end) {
    document.getElementById('ratingBadge').classList.add('show');
  }

  // 阶段2: 对比信息 (3000~3800ms)
  if (elapsed >= 3000) {
    document.getElementById('beatText').classList.add('show');
  }
  if (elapsed >= 3400) {
    document.getElementById('changeText').classList.add('show');
  }

  // 阶段3: 雷达图展开 (3500~5500ms)
  if (elapsed >= PHASES.RADAR_DRAW.start) {
    document.getElementById('radarSection').classList.add('show');
    const radarT = Math.min((elapsed - PHASES.RADAR_DRAW.start) / (PHASES.RADAR_DRAW.end - PHASES.RADAR_DRAW.start), 1);
    radarProgress = radarT;
    drawRadarCanvas(radarT);
  }

  // 阶段4: 进度条逐个填充 (5500~8000ms)
  if (elapsed >= PHASES.BARS_FILL.start) {
    const barDuration = 450; // 每条填充时间
    const barDelay = 350;    // 间隔
    dimensions.forEach((d, i) => {
      const barStart = PHASES.BARS_FILL.start + i * barDelay;
      if (elapsed >= barStart) {
        // 显示整行
        document.getElementById('barItem' + i).classList.add('show');
        // 填充宽度
        const localT = Math.min((elapsed - barStart) / barDuration, 1);
        const eased = easeOutCubic(localT);
        document.getElementById('barFill' + i).style.width = (d.score * eased) + '%';
      }
    });
  }

  // 阶段5: AI洞察 (8200~9500ms)
  if (elapsed >= 8200) {
    document.getElementById('insightSection').classList.add('show');
  }
  [0, 1, 2].forEach(i => {
    if (elapsed >= 8400 + i * 400) {
      document.getElementById('insight' + i).classList.add('show');
    }
  });

  if (elapsed < 10000) {
    animFrame = requestAnimationFrame(animate);
  }
}

function startAnimation() {
  resetAll();
  startTime = Date.now();
  if (animFrame) cancelAnimationFrame(animFrame);
  animFrame = requestAnimationFrame(animate);
}

function replay() {
  startAnimation();
}

// ========== 初始化 ==========
window.onload = function() {
  initRadarCanvas();
  startAnimation();
};

window.addEventListener('resize', () => {
  initRadarCanvas();
  drawRadarCanvas(radarProgress);
});
</script>

</body>
</html>
